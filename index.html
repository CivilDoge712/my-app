<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>My Task App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Padding for iPhone Notch -->
    <div style="height: env(safe-area-inset-top); background: white;"></div>

    <div class="content">
        <h1>My Tasks</h1>
        
        <!-- Task Input Area -->
        <div class="card" style="display: flex; gap: 10px;">
            <input type="text" id="taskInput" placeholder="New task..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <button onclick="addTask()" class="btn-primary" style="width: auto; padding: 10px 15px;">Add</button>
        </div>

        <!-- Task List Display -->
        <div id="taskList" style="margin-top: 20px;"></div>
    </div>

    <!-- 2-Button Navbar for Home -->
    <nav class="navbar">
        <a href="settings.html" class="nav-item">⚙️<span>Settings</span></a>
        <a href="info.html" class="nav-item">📊<span>Info</span></a>
    </nav>

    <script>
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        renderTasks();

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === "") return;
            tasks.push({ text: input.value, completed: false });
            input.value = "";
            saveAndRender();
        }

        function deleteTask(index) {
            let total = parseInt(localStorage.getItem('completed') || 0);
            localStorage.setItem('completed', total + 1);

            tasks.splice(index, 1);
            
            saveAndRender();

        }

        function saveAndRender() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map((task, i) => `
                <div class="card" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                    <span style="flex: 1;">${task.text}</span>
                    <button onclick="deleteTask(${i})" style="background: none; border: none; color: #ff3b30; font-size: 24px; padding: 5px 10px;">✕</button>
                </div>
            `).join('');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

</body>
</html>
