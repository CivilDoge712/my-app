<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Task App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="height: env(safe-area-inset-top); background: white;"></div>
    
    <div class="content">
        <h1>My Tasks</h1>
        <div class="card" style="display: flex; gap: 10px;">
            <input type="text" id="taskInput" placeholder="New task...">
            <button onclick="addTask()" class="btn-primary" style="width: auto;">Add</button>
        </div>
        <div id="taskList"></div>
    </div>

    <nav class="navbar">
        <a href="settings.html" class="nav-item">⚙️<span>Settings</span></a>
        <a href="info.html" class="nav-item">📊<span>Info</span></a>
    </nav>

    <script>
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        renderTasks();

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === "") return;
            tasks.push({ text: input.value });
            input.value = "";
            saveAndRender();
        }

        function deleteTask(index) {
            if (navigator.vibrate) navigator.vibrate(50);
            let total = parseInt(localStorage.getItem('completed') || 0);
            localStorage.setItem('completed', total + 1);
            tasks.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map((task, i) => `
                <div class="card" style="justify-content: space-between; margin-bottom: 10px;">
                    <span>${task.text}</span>
                    <button onclick="deleteTask(${i})" style="background:none; border:none; color:#34c759; font-size:24px;">✔</button>
                </div>
            `).join('');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
