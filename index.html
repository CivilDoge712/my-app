<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Task App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="height: env(safe-area-inset-top); background: white;"></div>
    
    <div class="content">
        <h1>My Tasks</h1>
        <div class="card" style="display: flex; gap: 10px;">
            <input type="text" id="taskInput" placeholder="New task...">
            <button onclick="addTask()" class="btn-primary" style="width: auto;">Add</button>
        </div>
        <div id="taskList"></div>
    </div>

    <nav class="navbar">
        <a href="settings.html" class="nav-item">⚙️<span>Settings</span></a>
        <a href="info.html" class="nav-item">📊<span>Info</span></a>
    </nav>

        <!-- Inside index.html - replace your script section -->
    <script>
        // 1. Initialise data
        let tasks = [];
        try {
            const saved = localStorage.getItem('myTasks');
            tasks = saved ? JSON.parse(saved) : [];
        } catch (e) {
            tasks = [];
        }

        // 2. Render function (Fixed HTML template)
        function renderTasks() {
            const list = document.getElementById('taskList');
            if (!list) return;
            
            if (tasks.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#8e8e93;">No tasks yet!</p>';
                return;
            }

            list.innerHTML = tasks.map((task, i) => `
                <div class="task-card">
                    <span class="task-text">${task.text}</span>
                    <button class="tick-btn" onclick="deleteTask(${i})">✔</button>
                </div>
            `).join('');
        }

        // 3. Logic functions
        function addTask() {
            const input = document.getElementById('taskInput');
            const val = input.value.trim();
            if (!val) return;
            
            tasks.push({ text: val });
            input.value = "";
            saveAndRender();
        }

        function deleteTask(index) {
            if (navigator.vibrate) navigator.vibrate(50);
            
            // Update stats
            let total = parseInt(localStorage.getItem('completed') || 0);
            localStorage.setItem('completed', total + 1);
            
            // Remove task
            tasks.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Run on load
        window.onload = renderTasks;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

</body>
</html>
